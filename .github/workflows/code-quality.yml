name: Code Quality Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  formatting-and-linting:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install formatting and linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black ruff isort

    - name: Check code formatting with Black
      run: |
        black --check --diff .
      continue-on-error: false

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .
      continue-on-error: false

    - name: Lint with Ruff
      run: |
        ruff check .
      continue-on-error: false

    - name: Check for common issues
      run: |
        # Check for print statements (should use logging)
        echo "Checking for print statements..."
        ! grep -r "print(" --include="*.py" . || echo "Warning: print() statements found"

        # Check for TODO comments
        echo "Checking for TODO comments..."
        grep -r "TODO\|FIXME" --include="*.py" . || echo "No TODOs found"

  type-checking:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy types-requests
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Type check with mypy
      run: |
        mypy --install-types --non-interactive --ignore-missing-imports .
      continue-on-error: true  # Allow failures for now

  security-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Security check with Bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f screen

    - name: Upload Bandit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json

    - name: Check dependencies for known vulnerabilities
      run: |
        if [ -f requirements.txt ]; then
          safety check -r requirements.txt || true
        fi
      continue-on-error: true